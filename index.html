*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#e8e8e8;display:flex;justify-content:center;}
.app{background:#2BBFB3;width:100%;max-width:430px;min-height:100vh;}
.hdr{background:#1FA99E;padding:18px 18px 0;position:sticky;top:0;z-index:10;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.logo{font-family:'Bubblegum Sans',cursive;font-size:26px;color:white;text-shadow:2px 3px 0 rgba(0,0,0,0.12);}
.logo span{color:#FFD93D;}
.logo-sub{font-size:11px;color:rgba(255,255,255,0.7);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.prog{background:rgba(255,255,255,0.15);border-radius:20px;padding:3px 10px;font-size:11px;color:white;font-weight:700;white-space:nowrap;}
.mtabs{display:flex;overflow-x:auto;scrollbar-width:none;margin:0 -18px;padding:0 18px;}
.mtabs::-webkit-scrollbar{display:none;}
.mtab{flex-shrink:0;padding:9px 14px 11px;font-size:12px;font-weight:700;color:rgba(255,255,255,0.5);cursor:pointer;border-bottom:3px solid transparent;background:none;border-left:none;border-right:none;border-top:none;font-family:'Nunito',sans-serif;white-space:nowrap;transition:all .2s;}
.mtab.active{color:#FFD93D;border-bottom-color:#FFD93D;}
.content{padding:14px;}
/* City tabs */
.ctabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.ctab{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;border:1.5px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.65);background:rgba(255,255,255,0.1);font-family:'Nunito',sans-serif;transition:all .2s;}
.ctab.active{background:white;color:#1FA99E;border-color:white;}
/* Summary */
.sumbar{background:rgba(255,255,255,0.15);border-radius:16px;padding:12px;margin-bottom:12px;display:flex;justify-content:space-around;align-items:center;}
.sv{font-family:'Bubblegum Sans',cursive;font-size:22px;color:#FFD93D;line-height:1;text-align:center;}
.sl{font-size:10px;color:rgba(255,255,255,0.7);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;text-align:center;}
.sdiv{width:1px;height:32px;background:rgba(255,255,255,0.2);}
/* Hotel banner */
.hbanner{background:rgba(255,255,255,0.18);border-radius:12px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.hname{font-size:13px;font-weight:800;color:white;}
.hsub{font-size:10px;color:rgba(255,255,255,0.7);font-weight:600;margin-top:1px;}
.harr{font-size:14px;color:rgba(255,255,255,0.6);transition:transform .2s;margin-left:auto;flex-shrink:0;}
.harr.op{transform:rotate(90deg);}
.hdetail{display:none;background:white;border-radius:0 0 12px 12px;padding:0;margin-top:-6px;margin-bottom:8px;overflow:hidden;}
.hdetail.op{display:block;}
.hrow{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px dashed #E8F5F4;}
.hrow:last-child{border-bottom:none;}
.hrow-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:1px;}
.hrow-body{flex:1;}
.hrow-label{font-size:10px;color:#7A9A98;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.hrow-val{font-size:12px;font-weight:800;color:#1A3A3A;margin-top:2px;line-height:1.4;}
.hrow-val.green{color:#27AE60;}
.hrow-val.red{color:#E74C3C;}
.mbtn{display:inline-block;margin-top:6px;background:#2BBFB3;color:white;font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;cursor:pointer;border:none;font-family:'Nunito',sans-serif;text-decoration:none;}
/* Day cards */
.dcard{background:white;border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,0.08);}
.dhead{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;user-select:none;}
.dbadge{width:42px;height:42px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.dbadge .n{font-family:'Bubblegum Sans',cursive;font-size:18px;color:white;line-height:1;}
.dbadge .m{font-size:9px;color:rgba(255,255,255,0.85);font-weight:700;text-transform:uppercase;}
.dinfo{flex:1;min-width:0;}
.dcity{font-size:14px;font-weight:800;color:#1A3A3A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dtheme{font-size:11px;color:#7A9A98;margin-top:1px;font-weight:600;}
.dchev{font-size:16px;color:#B0CECE;transition:transform .2s;}
.dchev.op{transform:rotate(90deg);}
.dsteps{display:none;padding:4px 14px 14px;border-top:1.5px dashed #E8F5F4;}
.dsteps.op{display:block;}
/* Steps */
.step{display:flex;gap:10px;padding:9px 0;border-bottom:1px dashed #F0F8F7;align-items:flex-start;}
.step:last-child{border-bottom:none;}
.sleft{display:flex;flex-direction:column;align-items:center;width:38px;flex-shrink:0;padding-top:2px;}
.stime{font-size:10px;color:#7A9A98;font-weight:700;}
.sicon{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;margin:4px 0 2px;}
.sline{width:2px;flex:1;min-height:8px;background:#E8F5F4;border-radius:2px;}
.sbody{flex:1;}
.sname{font-size:13px;font-weight:800;color:#1A3A3A;line-height:1.3;}
.sdesc{font-size:11px;color:#7A9A98;margin-top:3px;line-height:1.4;font-weight:600;}
.stags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.tor{background:#FFF0CC;color:#D4840A;}.tre{background:#FFE8E8;color:#C0392B;}.tte{background:#E0F5F3;color:#1A9088;}.tgr{background:#E5F8E0;color:#27AE60;}.tpu{background:#F0EAFE;color:#7B4FD9;}

.arow{display:flex;align-items:center;gap:6px;margin-top:6px;cursor:pointer;}
.aarr{font-size:11px;color:#2BBFB3;transition:transform .2s;font-weight:700;line-height:1;}
.aarr.op{transform:rotate(90deg);}
.adetail{display:none;background:#F0FFFE;border-radius:8px;padding:8px 10px;margin-top:5px;}
.adetail.op{display:block;}
.atext{font-size:11px;color:#3A6B68;font-weight:600;line-height:1.5;}
.amaps{display:inline-block;margin-top:6px;background:#2BBFB3;color:white;font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;cursor:pointer;border:none;font-family:'Nunito',sans-serif;text-decoration:none;}
/* Checkbox */
.chk{width:24px;height:24px;border-radius:8px;border:2px solid #D5EEEC;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:transparent;transition:all .15s;font-family:'Nunito',sans-serif;}
.chk.done{background:#2BBFB3;border-color:#2BBFB3;color:white;}
.step.done .sname{text-decoration:line-through;color:#B0CECE;}
.tip{background:#FFF9E6;border-left:4px solid #FFD93D;border-radius:0 10px 10px 0;padding:8px 12px;margin:8px 0 4px;font-size:11px;color:#8B6914;font-weight:600;line-height:1.5;}
/* Coming soon */
.coming{background:white;border-radius:16px;padding:32px 20px;text-align:center;box-shadow:0 3px 12px rgba(0,0,0,0.08);}
.ctitle2{font-family:'Bubblegum Sans',cursive;font-size:18px;color:#1A3A3A;margin-bottom:6px;}
.csub{font-size:12px;color:#7A9A98;font-weight:600;margin-bottom:16px;line-height:1.5;}

.tsec{font-family:'Bubblegum Sans',cursive;font-size:15px;color:white;margin:14px 0 10px;display:flex;align-items:center;gap:6px;}
.tsec:first-child{margin-top:4px;}
.tcard{background:white;border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,0.08);}

.ttribe{display:flex;align-items:center;gap:8px;}
.ticon2{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.tname2{font-size:13px;font-weight:800;color:#1A3A3A;}
.tsub2b{font-size:10px;color:#7A9A98;font-weight:600;}
.tnum{font-size:11px;font-weight:700;color:#1A9088;background:#E0F5F3;padding:3px 9px;border-radius:20px;white-space:nowrap;}

.tcity{flex:1;}
.tcity.r{text-align:right;}
.tcode{font-family:'Bubblegum Sans',cursive;font-size:22px;color:#1A3A3A;line-height:1;}
.tcname{font-size:10px;color:#7A9A98;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.ttime{font-size:14px;font-weight:800;color:#2BBFB3;margin-top:3px;}
.tdate{font-size:10px;color:#7A9A98;font-weight:600;}
.tmid{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 4px;}
.tdur{font-size:10px;color:#7A9A98;font-weight:700;}
.tlw{display:flex;align-items:center;width:100%;gap:3px;}
.tl{flex:1;height:1.5px;background:#D5EEEC;}
.tp{font-size:14px;}
.tstop{font-size:10px;color:#FF6B6B;font-weight:700;background:#FFE8E8;padding:2px 7px;border-radius:20px;margin-top:2px;}
.tfoot{padding:8px 14px 11px;border-top:1.5px dashed #E8F5F4;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

.trhlbl{font-family:'Bubblegum Sans',cursive;font-size:14px;color:white;}

.irow:last-child{border-bottom:none;}
.iic{font-size:18px;flex-shrink:0;}
.ib{flex:1;}
.ilbl{font-size:10px;color:#7A9A98;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.ival{font-size:13px;font-weight:800;color:#1A3A3A;margin-top:1px;}
.ival.hi{color:#2BBFB3;}
.pnr{font-size:10px;color:#7A9A98;background:#F5F5F5;padding:2px 8px;border-radius:20px;font-weight:700;}
</style>
</head>

var curCity='bkk';

function tg(id,cls){var e=document.getElementById(id);if(e)e.classList.toggle(cls);}
function toggleAddr(id){tg('ad-'+id,'op');tg('aa-'+id,'op');}
function toggleDay(id){tg('ds-'+id,'op');tg('dc-'+id,'op');}
function toggleHotel(c){tg('hd-'+c,'op');tg('ha-'+c,'op');}
function toggleStep(id){
  CK[id]=!CK[id];
  var el=document.getElementById('st-'+id),btn=document.getElementById('ck-'+id);
  if(CK[id]){el.classList.add('done');btn.classList.add('done');btn.textContent='✓';}
  else{el.classList.remove('done');btn.classList.remove('done');btn.textContent='';}
  var done=Object.values(CK).filter(Boolean).length;
  document.getElementById('prog').textContent=done+' / '+TOTAL_STEPS;
}

function makeCityTabs(){
  var keys=['bkk','cnx','skt','uth','usm','bkk2'];
  return '<div class="ctabs">'+keys.map(function(k){
    return '<button class="ctab'+(k===curCity?' active':'')+'" onclick="showCity(\''+k+'\')">'+CITIES_DATA[k].label+'</button>';
  }).join('')+'</div>';
}

function showCity(city){
  curCity=city;
  var d=CITIES_DATA[city];
  if(d.coming){renderComing(city);}
  else{renderCity(city);}
}

function renderCity(city){
  var d=CITIES_DATA[city];
  var h=HOTELS[d.hotel];
  var html=makeCityTabs();
  var totalSteps=0;
  d.days.forEach(function(day){totalSteps+=day.steps.length;});
  html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">'
    +'<button onclick="renderMap()" style="background:rgba(255,255,255,0.2);border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;color:white;cursor:pointer;font-family:Nunito,sans-serif;flex-shrink:0;">‹ Carte</button>'
    +'<div class="sumbar" style="flex:1;margin-bottom:0;padding:10px 12px;">'
    +'<div><div class="sv">'+d.jours+'</div><div class="sl">jours</div></div>'
    +'<div class="sdiv"></div>'
    +'<div><div class="sv">'+totalSteps+'</div><div class="sl">étapes</div></div>'
    +'</div>'
    +'</div>';
  html+=makeHotelCard(city,h);
  d.days.forEach(function(day,di){

    html+='<div class="dcard">'
      +'<div class="dhead" onclick="toggleDay(\''+did+'\')">'

      +'<div class="dsteps" id="ds-'+did+'">'
      +'<div class="tip">'+day.tip+'</div>';
    day.steps.forEach(function(s,si){
      var sid=city+'_'+di+'_'+si;
      var tags=(s.tags||[]).map(function(t){return '<span class="tag '+t[1]+'">'+t[0]+'</span>';}).join('');
      html+='<div class="step" id="st-'+sid+'">'

        +'<div class="sbody">'
        +'<div class="sname">'+s.n+'</div>'
        +'<div class="sdesc">'+s.d+'</div>'
        +(tags?'<div class="stags">'+tags+'</div>':'')

        +'<span class="aarr" id="aa-'+sid+'">▸</span>'
        +'<span style="font-size:11px;color:#2BBFB3;font-weight:700;">Adresse & Maps</span>'

        +'</div>'
        +'</div>'
        +'<button class="chk" id="ck-'+sid+'" onclick="toggleStep(\''+sid+'\')"></button>'
        +'</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('content').innerHTML=html;
}

  document.querySelectorAll('.city-pin').forEach(function(g){
    g.style.cursor='pointer';
    g.addEventListener('click', function(){
      goCity(this.getAttribute('data-city'));
    });
  });
}

function goCity(city){
  curCity=city;
  document.querySelectorAll('.mtab').forEach(function(t){t.classList.remove('active');});
  document.querySelector('.mtab').classList.add('active');
  var d=CITIES_DATA[city];
  if(d.coming){renderComing(city);}else{renderCity(city);}
}

function showMain(tab,btn){
  document.querySelectorAll('.mtab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  if(tab==='transport'){renderTransport();}
  else{curCity='bkk';renderMap();}
}

renderMap();
</script>
